<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>将棋RPG ミニクエスト 9x9</title>
<style>
:root{
  --bg:#fff7e8;--ink:#24140e;--panel:#fffaf0;--board:#d59a45;--cell:#f4c47a;
  --line:#6b3f18;--accent:#d97706;--blue:#2563eb;--green:#16a34a;--red:#dc2626;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(#fff7e8,#fdebd0);color:var(--ink)}
.app{min-height:100dvh;padding:calc(env(safe-area-inset-top) + 8px) 10px calc(env(safe-area-inset-bottom) + 8px);max-width:1180px;margin:auto;display:grid;grid-template-rows:auto 1fr;gap:8px}
header{display:flex;align-items:center;justify-content:space-between;gap:8px}
h1{font-size:clamp(19px,4vw,32px);margin:0;font-weight:900}
.stats{font-size:13px;text-align:right;white-space:nowrap}
.main{display:grid;grid-template-columns:1fr;gap:10px}
@media (orientation:landscape) and (min-width:850px){.main{grid-template-columns:minmax(430px,1fr) 380px;align-items:start}}
.boardWrap{width:100%;display:flex;justify-content:center}
.board{
  width:min(94vw,72dvh,720px);
  aspect-ratio:1/1;
  background:var(--board);
  border:4px solid var(--line);
  border-radius:12px;
  padding:4px;
  display:grid;
  grid-template-columns:repeat(9,1fr);
  grid-template-rows:repeat(9,1fr);
  gap:1px;
  box-shadow:0 8px 22px #0002;
}
.cell{
  border:1px solid #8a5a22;
  background:var(--cell);
  display:flex;align-items:center;justify-content:center;
  padding:0;margin:0;border-radius:3px;
  position:relative;touch-action:manipulation;user-select:none;
  min-width:0;min-height:0;
}
.cell.sel{outline:3px solid var(--blue);outline-offset:-3px}
.cell.legal{background:#fde68a}
.piece{
  width:84%;height:88%;
  display:flex;align-items:center;justify-content:center;
  clip-path:polygon(50% 0%, 88% 18%, 82% 100%, 18% 100%, 12% 18%);
  background:#fff8dc;
  border:2px solid #4b2e12;
  color:#111;
  font-weight:900;
  font-size:clamp(13px,4.6vw,34px);
  line-height:1;
  box-shadow:0 2px 0 #6b3f18;
}
.enemy .piece{transform:rotate(180deg);background:#ffe4e6}
.panel{background:rgba(255,250,240,.96);border:2px solid #d6b98a;border-radius:16px;padding:12px;box-shadow:0 6px 16px #0001}
.panel h2{font-size:19px;margin:0 0 8px}
.quest{border:1px solid #fed7aa;background:#fff7ed;border-radius:12px;padding:10px;margin-bottom:8px;line-height:1.5}
.msg{min-height:72px;line-height:1.55;font-size:15px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
button{font:inherit;font-weight:800;border:0;border-radius:12px;padding:11px 13px;background:var(--accent);color:white;touch-action:manipulation}
button.secondary{background:#6b7280}
select{font:inherit;font-weight:800;border:2px solid #d6b98a;border-radius:12px;padding:10px;background:white;max-width:100%}
.small{font-size:12px;color:#6b4d36}
.choice{display:block;width:100%;margin:7px 0;background:#fff;border:2px solid #f59e0b;color:#24140e;text-align:left}
.choice.correct{background:#dcfce7;border-color:var(--green)}
.choice.wrong{background:#fee2e2;border-color:var(--red)}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>将棋RPG ミニクエスト 9×9</h1>
  <div class="stats" id="stats"></div>
</header>

<div class="main">
  <div class="boardWrap"><div class="board" id="board" aria-label="9×9将棋盤"></div></div>
  <section class="panel">
    <h2 id="chapter">修正版</h2>
    <div class="quest" id="quest"></div>
    <div class="msg" id="msg"></div>
    <div id="choices"></div>
    <div class="row">
      <button id="nextBtn">次の問題</button>
      <button class="secondary" id="prevBtn">前の問題</button>
      <select id="jump"></select>
      <button class="secondary" id="resetBtn">保存リセット</button>
    </div>
    <p class="small">修正点：9×9盤、正方形、途中問題選択、駒の視認性改善、正解時に実際に駒が移動、ローカル保存。</p>
  </section>
</div>
</div>

<script>
const SENTE="me", GOTE="enemy";
const P={FU:"歩",KY:"香",KE:"桂",GI:"銀",KI:"金",KA:"角",HI:"飛",OU:"王"};
const puzzles=[
 {title:"第1問：歩の一歩",text:"先手の歩を1マス前に進めよう。",pieces:[[SENTE,P.FU,4,6],[GOTE,P.OU,4,0]],answer:[[4,6],[4,5]],tip:"先手の歩は上へ1マス進む。"},
 {title:"第2問：金の守り",text:"金を王様の前に動かして守ろう。",pieces:[[SENTE,P.KI,3,7],[SENTE,P.OU,4,8],[GOTE,P.HI,4,2]],answer:[[3,7],[4,7]],tip:"金は前・横・後ろ・斜め前に動ける。"},
 {title:"第3問：飛車の直線",text:"飛車で相手の王を取りに行こう。",pieces:[[SENTE,P.HI,4,8],[SENTE,P.OU,0,8],[GOTE,P.OU,4,1]],answer:[[4,8],[4,1]],tip:"飛車は縦横にまっすぐ進む。"},
 {title:"第4問：角のななめ",text:"角で相手の王を取りに行こう。",pieces:[[SENTE,P.KA,1,7],[SENTE,P.OU,8,8],[GOTE,P.OU,5,3]],answer:[[1,7],[5,3]],tip:"角は斜めに進む。"},
 {title:"第5問：銀の攻め",text:"銀を前ななめに進めて攻めよう。",pieces:[[SENTE,P.GI,4,6],[SENTE,P.OU,8,8],[GOTE,P.OU,3,5]],answer:[[4,6],[3,5]],tip:"銀は前、斜め前、斜め後ろに動ける。"},
 {title:"第6問：次の一手",text:"いちばん強い一手を選ぼう。",choices:["歩を進める","飛車で王を取る","王を逃げる"],correct:1,pieces:[[SENTE,P.HI,4,8],[SENTE,P.OU,0,8],[GOTE,P.OU,4,1]],tip:"王を取れる直線がないか見よう。"}
];

let state=JSON.parse(localStorage.getItem("shogiRpg9")||'{"lv":1,"xp":0,"p":0}');
let pieces=[], selected=null, locked=false;
const board=document.getElementById("board"), quest=document.getElementById("quest"), msg=document.getElementById("msg"), choices=document.getElementById("choices"), stats=document.getElementById("stats"), jump=document.getElementById("jump");

function save(){localStorage.setItem("shogiRpg9",JSON.stringify(state))}
function cur(){return puzzles[Math.max(0,Math.min(state.p,puzzles.length-1))]}
function clonePieces(q){return q.pieces.map(a=>({side:a[0],kind:a[1],x:a[2],y:a[3]}))}
function same(a,b){return a&&b&&a[0]===b[0]&&a[1]===b[1]}
function pieceAt(x,y){return pieces.find(p=>p.x===x&&p.y===y)}
function renderAll(){pieces=clonePieces(cur()); selected=null; locked=false; renderPanel(); renderBoard();}
function renderPanel(){
 const q=cur();
 stats.innerHTML=`Lv.${state.lv}<br>経験値 ${state.xp}`;
 quest.innerHTML=`<b>${q.title}</b><br>${q.text}<br><span class="small">ヒント：${q.tip}</span>`;
 msg.textContent=q.choices?"選択肢から答えてね。":"味方の駒をタップしてね。";
 choices.innerHTML="";
 jump.innerHTML=puzzles.map((p,i)=>`<option value="${i}" ${i===state.p?"selected":""}>${i+1}問目</option>`).join("");
 if(q.choices){
   q.choices.forEach((t,i)=>{
     const b=document.createElement("button"); b.className="choice"; b.textContent=t;
     b.onclick=()=>answerChoice(i,b); choices.appendChild(b);
   });
 }
}
function renderBoard(){
 const q=cur();
 board.innerHTML="";
 for(let y=0;y<9;y++)for(let x=0;x<9;x++){
   const c=document.createElement("button"); c.className="cell";
   const pc=pieceAt(x,y);
   if(pc){c.classList.add(pc.side===GOTE?"enemy":"me"); c.innerHTML=`<span class="piece">${pc.kind}</span>`}
   if(selected && same([x,y],selected)) c.classList.add("sel");
   if(selected && same([x,y],q.answer?.[1])) c.classList.add("legal");
   c.onclick=()=>tap(x,y);
   board.appendChild(c);
 }
}
function tap(x,y){
 const q=cur(); if(locked||q.choices)return;
 if(!selected){
   const pc=pieceAt(x,y);
   if(!pc || pc.side!==SENTE){msg.textContent="自分の駒を選んでね。"; return;}
   selected=[x,y]; msg.textContent="移動先をタップしてね。"; renderBoard(); return;
 }
 const ok=same(selected,q.answer[0]) && same([x,y],q.answer[1]);
 if(ok){
   const pc=pieceAt(selected[0],selected[1]);
   pieces=pieces.filter(p=>!(p.x===x&&p.y===y));
   pc.x=x; pc.y=y; pieces.push(pc);
   selected=null; clear("正解！駒が動いたよ。");
   renderBoard();
 }else{
   selected=null; msg.textContent="惜しい！もう一度。"+q.tip; renderBoard();
 }
}
function clear(text){
 locked=true; state.xp+=20;
 if(state.xp>=100){state.xp-=100;state.lv++}
 msg.textContent=text+" 経験値+20。次の問題へ進めます。";
 save();
}
function answerChoice(i,b){
 if(locked)return; locked=true;
 const q=cur();
 b.classList.add(i===q.correct?"correct":"wrong");
 if(i===q.correct) clear("正解！");
 else {msg.textContent="惜しい！正解は「"+q.choices[q.correct]+"」。"+q.tip; setTimeout(()=>locked=false,500)}
}
document.getElementById("nextBtn").onclick=()=>{state.p=Math.min(state.p+1,puzzles.length-1);save();renderAll()}
document.getElementById("prevBtn").onclick=()=>{state.p=Math.max(state.p-1,0);save();renderAll()}
document.getElementById("resetBtn").onclick=()=>{if(confirm("保存を消しますか？")){state={lv:1,xp:0,p:0};save();renderAll()}}
jump.onchange=()=>{state.p=Number(jump.value);save();renderAll()}
renderAll();
</script>
</body>
</html>
